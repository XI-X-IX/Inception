services:

  # ─────────────────────────────────────────────
  # MANDATORY — Services obligatoires
  # ─────────────────────────────────────────────

  nginx:
    build: ./requirements/nginx
    container_name: nginx
    ports:
      - "443:443"
    volumes:
      - wordpress_files:/var/www/wordpress
    depends_on:
      - wordpress
    networks:
      - inception
    restart: always
    env_file:
      - .env

  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    volumes:
      - wordpress_files:/var/www/wordpress
      - ../secrets/db_password.txt:/run/secrets/db_password.txt:ro
      - ../secrets/user2_password.txt:/run/secrets/user2_password.txt:ro
      - ../secrets/admin_password.txt:/run/secrets/admin_password.txt:ro
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_HOST=mariadb
    depends_on:
      - mariadb
      - redis
    networks:
      - inception
    restart: always
    env_file:
      - .env

  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    volumes:
      - wordpress_db:/var/lib/mysql
      - ../secrets/db_root_password.txt:/run/secrets/db_root_password.txt:ro
      - ../secrets/db_password.txt:/run/secrets/db_password.txt:ro
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
    networks:
      - inception
    restart: always
    env_file:
      - .env

  # ─────────────────────────────────────────────
  # BONUS — Services supplémentaires
  # ─────────────────────────────────────────────

  # Cache WordPress (requiert php7.4-redis dans le container wordpress)
  redis:
    build: ./requirements/bonus/redis
    container_name: redis
    networks: 
     - inception
    restart: always

  # Interface web pour gérer MariaDB (accessible via /adminer)
  adminer:
    build: ./requirements/bonus/adminer
    container_name: adminer
    depends_on:
     - mariadb
    networks:
     - inception
    restart: always

  # Serveur FTP pointant sur les fichiers WordPress
  ftp:
    build: ./requirements/ftp
    container_name: ftp
    ports:
      - "21:21"
      - "21000-21010:21000-21010"
    volumes:
      - wordpress_files:/var/www/wordpress
      - ../secrets/ftp_password.txt:/run/secrets/ftp_password.txt:ro
    environment:
      - FTP_USER=${FTP_USER}
    networks:
      - inception
    restart: always
    env_file:
      - .env

  # Site statique HTML (accessible via /static)
  static-site:
    build: ./requirements/static-site
    container_name: static-site
    networks:
      - inception
    restart: always

  # cAdvisor — collecte les métriques de tous les containers Docker
  # Nécessite l'accès au socket Docker et aux cgroups du host
  cadvisor:
    build: ./requirements/cadvisor
    container_name: cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - inception
    restart: always

  # Prometheus — collecte et stocke les métriques de cAdvisor
  prometheus:
    build: ./requirements/prometheus
    container_name: prometheus
    volumes:
      - prometheus_data:/var/lib/prometheus
    depends_on:
      - cadvisor
    networks:
      - inception
    restart: always

  # Grafana — affiche les métriques sous forme de dashboards (via /grafana/)
  grafana:
    build: ./requirements/grafana
    container_name: grafana
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    environment:
      - GF_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}
    networks:
      - inception
    restart: always
    env_file:
      - .env


# ─────────────────────────────────────────────
# Volumes nommés — données persistantes
# Le path host est défini dans le Makefile via DOCKER_VOLUME_PATH
# ─────────────────────────────────────────────
volumes:
  wordpress_files:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/aledos-s/data/wordpress

  wordpress_db:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/aledos-s/data/mariadb

  prometheus_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/aledos-s/data/prometheus

  grafana_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/aledos-s/data/grafana

# ─────────────────────────────────────────────
# Réseau bridge interne — les containers se parlent par leur nom
# ─────────────────────────────────────────────
networks:
  inception:
    driver: bridge