[server]
# Accessible via nginx à l'adresse /grafana/
root_url = %(protocol)s://%(domain)s/grafana/
serve_from_sub_path = true

[paths]
data = /var/lib/grafana
logs = /var/log/grafana

[security]
# Mot de passe admin lu depuis la variable d'environnement GF_ADMIN_PASSWORD
admin_password = ${GF_ADMIN_PASSWORD}

[auth.anonymous]
# Désactive l'accès sans login
enabled = false